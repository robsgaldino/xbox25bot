name: xbox25bot

on:
  schedule:
    - cron: "*/10 * * * *"   # a cada 10 min (o GitHub pode atrasar alguns minutos)
  workflow_dispatch:          # botão de rodar manualmente

permissions:
  contents: write

concurrency:
  group: xbox25bot
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      TZ: America/Sao_Paulo   # timestamps no fuso do Robson
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Varredura das lojas
        env:
          XBOX25_CONFIG: config.cloud.json
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: python xbox25bot.py

      - name: Publicar estado para o dashboard (GitHub Pages)
        run: |
          mkdir -p docs
          cp state.json docs/state.json
          cp config.cloud.json docs/config.json
          tail -n 120 bot.log > docs/bot.log || true
          git config user.name "xbox25bot"
          git config user.email "xbox25bot@users.noreply.github.com"
          git add -f state.json docs/state.json docs/config.json docs/bot.log
          if git diff --cached --quiet; then
            echo "sem mudanças para commitar"
          else
            git pull --rebase --autostash origin main
            git commit -m "varredura $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
